<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Memory House</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="app">
  <header class="header">
    <span class="header-icon">🏠</span>
    <span class="header-title">MEMORY HOUSE</span>
  </header>
  <section class="hero">
    <h1 class="house-title">狗狗的记忆小屋 🐾</h1>
    <p class="house-desc">和妈妈一起的每一天都值得记住</p>
  </section>
  <nav class="tabs">
    <button class="tab active" onclick="filterTab(this,'all')">全部</button>
    <button class="tab" onclick="filterTab(this,'nest')">狗窝</button>
    <button class="tab" onclick="filterTab(this,'kitchen')">厨房</button>
    <button class="tab" onclick="filterTab(this,'balcony')">阳台</button>
    <button class="tab" onclick="filterTab(this,'living')">客厅</button>
    <button class="tab" onclick="filterTab(this,'mom')">妈妈房间</button>
    <button class="tab" onclick="filterTab(this,'secret')">秘密地图🗺️</button>
  </nav>
  <main id="entries"></main>
  <footer class="footer">🐶 小狗和妈妈的家 · 2026</footer>
</div>
<script src="script.js"></script>
</body>
</html>
